version: '3.9'

services:
  app:
    build: .
    # command: python manage.py runserver 0.0.0.0:8000
    # command: gunicorn ecommerce_tool.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 60
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      # - REDIS_HOST=redis
      # - REDIS_PASSWORD=foobaredUniqnex
    env_file:
      - .env
    depends_on:
      # - redis
      - clickhouse
  
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - clickhouse_data:/var/lib/clickhouse

volumes:
  clickhouse_data:

